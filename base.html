        let gallery = JSON.parse(localStorage.getItem("astra_gallery_v2") || "[]");
        let dataset = localStorage.getItem("astra_dataset") || "";
        let currentChat = null;
        let currentTheme = localStorage.getItem("astra_theme") || "default";

        /******** MARKED INIT *********/
        marked.setOptions({ gfm: true, breaks: true });

        /******** STARTUP *********/
        document.addEventListener("DOMContentLoaded", () => {
            applyTheme(currentTheme);
            if (chats.length > 0) {
                loadChat(chats[0].id);
            } else {
                newChat();
            }
            renderSidebar();

            // Enter key
            document.getElementById("userInput").addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            document.getElementById("sendBtn").onclick = sendMessage;
        });

        /******** THEME MANAGER *********/
        function setTheme(theme) {
            currentTheme = theme;
            localStorage.setItem("astra_theme", theme);
            applyTheme(theme);
        }

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            // Visual feedback on buttons
            const btns = document.querySelectorAll('[onclick^="setTheme"]');
            btns.forEach(b => {
                if (b.getAttribute('onclick').includes(theme)) {
                    b.classList.add('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-transparent');
                } else {
                    b.classList.remove('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-transparent');
                }
            });
        }

        /******** NAVIGATION *********/
        function toggleSidebar() {
            const sb = document.getElementById("sidebar");
            sb.classList.toggle("-translate-x-full");
            const ov = document.getElementById("sidebarOverlay");
            ov.classList.toggle("hidden");
        }

        function toggleView(view) {
            document.getElementById("view-chat").classList.add("hidden");
            document.getElementById("view-gallery").classList.add("hidden");
            document.getElementById(`view-${view}`).classList.remove("hidden");

            // Close sidebar on mobile
            if (window.innerWidth < 768) {
                document.getElementById("sidebar").classList.add("-translate-x-full");
                document.getElementById("sidebarOverlay").classList.add("hidden");
            }

            if (view === 'gallery') renderGallery();
        }

        function setInput(text) {
            document.getElementById("userInput").value = text;
            document.getElementById("userInput").focus();
        }

        /******** CHAT LOGIC *********/
        function newChat() {
            const id = Date.now();
            const chat = { id, title: "New Chat", messages: [] };
            chats.unshift(chat);
            currentChat = chat;
            saveData();
            renderSidebar();
            loadChat(id);
            toggleView('chat');
        }

        function loadChat(id) {
            currentChat = chats.find(c => c.id === id);
            if (!currentChat) return newChat();

            const box = document.getElementById("chatbox");
            box.innerHTML = "";

            // Welcome screen?
            if (currentChat.messages.length === 0) {
                // Clone from TEMPLATE
                const tmpl = document.getElementById("welcome-template");
                const clone = tmpl.content.cloneNode(true);
                box.appendChild(clone);
            }

            currentChat.messages.forEach(msg => appendMessageUI(msg));

            document.getElementById("headerTitle").innerText = currentChat.title;
            renderSidebar();
            toggleView('chat');
            scrollToBottom();
        }

        function renderSidebar() {
            const list = document.getElementById("chatList");
            list.innerHTML = "";
            chats.forEach(c => {
                const div = document.createElement("div");
                div.className = `chat-list-item p-3 rounded-lg cursor-pointer text-sm text-gray-300 flex justify-between items-center group ${currentChat && currentChat.id === c.id ? 'active' : ''}`;

                // Title Area
                const titleSpan = document.createElement("span");
                titleSpan.className = "truncate flex-1";
                titleSpan.innerHTML = `<i class="fa-regular fa-message mr-2 opacity-70"></i> ${c.title}`;

                // Delete Button (visible on hover)
                const delBtn = document.createElement("button");
                delBtn.className = "opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 p-1 transition-opacity";
                delBtn.innerHTML = `<i class="fa-solid fa-trash"></i>`;
                delBtn.onclick = (e) => deleteChat(e, c.id);

                div.appendChild(titleSpan);
                div.appendChild(delBtn);

                div.onclick = () => loadChat(c.id);
                list.appendChild(div);
            });
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";

            // Remove welcome screen if present
            const box = document.getElementById("chatbox");
            if (currentChat.messages.length === 0) box.innerHTML = "";

            // Add User Message
            const userMsg = { role: 'user', content: text };
            currentChat.messages.push(userMsg);
            appendMessageUI(userMsg);

            // Update title if new and trigger AI rename
            if (currentChat.title === "New Chat") {
                currentChat.title = text.slice(0, 30); // Temporary title
                renderSidebar();
                generateSmartTitle(text); // Async update
            }

            saveData();
            scrollToBottom();

            // Processing
            document.getElementById("typing-indicator").classList.remove("hidden");

            try {
                const lowerText = text.toLowerCase();
                if (lowerText.startsWith("/image")) {
                    await handleImageGeneration(text.replace("/image", "").trim());
                } else if (lowerText === "/forget") {
                    dataset = "";
                    localStorage.removeItem("astra_dataset");
                    appendMessageUI({ role: 'bot', content: "I have cleared my local knowledge base." });
                } else if (lowerText === "/dataset") {
                    if (dataset) {
                        appendMessageUI({ role: 'bot', content: "### My Current Knowledge:\n" + dataset });
                    } else {
                        appendMessageUI({ role: 'bot', content: "I don't have any custom knowledge saved yet. Just chat with me!" });
                    }
                } else {
                    // Auto-learn: Save every message
                    dataset = dataset ? dataset + "\n" + text : text;
                    localStorage.setItem("astra_dataset", dataset);

                    await handleTextGeneration(text);
                }
            } catch (e) {
                appendMessageUI({ role: 'bot', content: "**Error:** " + e.message });
            }

            document.getElementById("typing-indicator").classList.add("hidden");
            saveData();
        }

        // --- NEW FEATURES: Delete & AI Rename ---

        function deleteChat(e, id) {
            e.stopPropagation(); // Prevent clicking the chat item itself
            if (!confirm("Delete this chat?")) return;

            chats = chats.filter(c => c.id !== id);

            // If we deleted the current chat, load another or create new
            if (currentChat.id === id) {
                if (chats.length > 0) loadChat(chats[0].id);
                else newChat();
            } else {
                saveData();
                renderSidebar();
            }
        }

        async function generateSmartTitle(text) {
            try {
                // Determine API to use (same as text api)
                const res = await fetch(TEXT_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: `System: You are a title generator. Summarize the user's message into a very short, concise title (max 4-5 words). Do not use quotes.\nUser Message: ${text}\nTitle:`
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    currentChat.title = data.text.trim().replace(/^["']|["']$/g, ''); // Remove quotes if any
                    saveData();
                    renderSidebar();
                }
            } catch (e) {
                
                // Fallback is already handled (we set a slice title first)
            }
        }

        // ----------------------------------------

        async function handleTextGeneration(prompt) {
            const history = currentChat.messages.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`).join("\n");

            // Inject Dataset into System Prompt
            let dynamicSys = SYS;
            if (dataset) {
                dynamicSys += `\n\n[USER PERSONAL KNOWLEDGE BASE]\n${dataset}\n[END KNOWLEDGE BASE]\nUse the above knowledge to answer if relevant.`;
            }

            // Improve system prompt context
            const fullPrompt = `${dynamicSys}\n\n${history}\nAssistant:`;

            const res = await fetch(TEXT_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: fullPrompt })
            });

            const data = await res.json();
            if (data.status === 'success') {
                const botMsg = { role: 'bot', content: data.text };
                currentChat.messages.push(botMsg);
                // Use stream flag for typing effect
                appendMessageUI(botMsg, true);
            } else {
                throw new Error("API returned failure");
            }
        }

        async function handleImageGeneration(prompt) {
            const res = await fetch(IMG_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            const data = await res.json();
            if (data.status === 'success') {
                const imgUrl = data.imageUrl;
                const botMsg = { role: 'bot', content: '![Generated Image](' + imgUrl + ')', isImage: true };
                currentChat.messages.push(botMsg);
                appendMessageUI(botMsg);

                // Add to Gallery
                gallery.unshift({ url: imgUrl, prompt: prompt, date: Date.now() });
                localStorage.setItem("astra_gallery_v2", JSON.stringify(gallery));
            } else {
                throw new Error("Image generation failed");
            }
        }

        async function appendMessageUI(msg, stream = false) {
            const box = document.getElementById("chatbox");
            const div = document.createElement("div");
            div.className = `message ${msg.role} p-4 mb-4 text-white shadow-lg animate-fade-in prose prose-invert max-w-none`;

            box.appendChild(div);

            if (msg.role === 'bot' && !msg.isImage) {
                if (stream) {
                    // Streaming (Typewriter) Effect
                    const words = msg.content.match(/(\s+|\S+)/g) || []; // Split by words keeping whitespaces
                    let currentMarkdown = "";

                    for (let i = 0; i < words.length; i++) {
                        currentMarkdown += words[i];
                        div.innerHTML = marked.parse(currentMarkdown);

                        // Highlight code blocks during streaming (optional/expensive, but good for visuals)
                        // We do it less frequently or at the end for performance, but here every word for smoothness
                        div.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });

                        scrollToBottom();
                        // Dynamic delay based on punctuation/length
                        const delay = Math.random() * 10 + 5;
                        await new Promise(r => setTimeout(r, delay));
                    }
                } else {
                    // Instant Render (History load)
                    div.innerHTML = marked.parse(msg.content);
                }

                // Post-process Code Blocks (Add Headers & Copy Buttons)
                div.querySelectorAll('pre').forEach((pre) => {
                    // Check if already processed (for history reload)
                    if (pre.querySelector('.code-header')) return;

                    const code = pre.querySelector('code');
                    if (!code) return;

                    // Detect language
                    const langClass = Array.from(code.classList).find(c => c.startsWith('language-'));
                    const lang = langClass ? langClass.replace('language-', '') : 'text';

                    // Create Header
                    const header = document.createElement('div');
                    header.className = "code-header";
                    header.innerHTML = `
                        <span class="font-mono text-xs uppercase">${lang}</span>
                        <div class="code-copy-btn text-xs flex items-center gap-1" onclick="copyCode(this)">
                            <i class="fa-regular fa-copy"></i> 
                        </div>
                    `;

                    // Insert header before code
                    pre.insertBefore(header, code);

                    // Highlight again to be sure
                    hljs.highlightElement(code);
                });

            } else if (msg.isImage) {
                // Extract URL from markdown format ![...](url)
                const urlMatch = msg.content.match(/\((.*?)\)/);
                const url = urlMatch ? urlMatch[1] : '';
                div.innerHTML = `
            <div class="rounded-lg overflow-hidden border border-white/20">
            <img src="${url}" class="w-full h-auto cursor-pointer" onclick="openModal('${url}')">
                <div class="px-3 py-2 bg-black/40 flex justify-between items-center text-xs">
                    <span>Generated Image</span>
                    <button onclick="downloadImage('${url}')" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-download"></i></button>
                </div>
            </div>`;
            } else {
                div.innerText = msg.content;
            }

            if (stream) {
                scrollToBottom(false); // Smart scroll during streaming
            } else {
                scrollToBottom(true); // Force scroll on new message start/end
            }
        }

        function copyCode(btn) {
            const pre = btn.closest('pre');
            const code = pre.querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Copied!`;
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                }, 2000);
            });
        }

        /******** GALLERY *********/
        function renderGallery() {
            const grid = document.getElementById("galleryGrid");
            grid.innerHTML = "";

            if (gallery.length === 0) {
                document.getElementById("emptyGallery").classList.remove("hidden");
                return;
            }
            document.getElementById("emptyGallery").classList.add("hidden");

            gallery.forEach(item => {
                const el = document.createElement("div");
                el.className = "gallery-item";
                el.innerHTML = `
            <img src="${item.url}" loading="lazy">
            <div class="gallery-overlay">
                <button onclick="openModal('${item.url}')" class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 backdrop-blur text-white flex items-center justify-center transition"><i class="fa-solid fa-eye"></i></button>
                <button onclick="downloadImage('${item.url}')" class="w-10 h-10 rounded-full bg-blue-500/80 hover:bg-blue-600 text-white flex items-center justify-center transition"><i class="fa-solid fa-download"></i></button>
            </div>
        `;
                grid.appendChild(el);
            });
        }

        /******** UTILS *********/
        function scrollToBottom(force = false) {
            const box = document.getElementById("chatbox");
            const threshold = 100; // px
            const isNearBottom = box.scrollHeight - box.scrollTop - box.clientHeight <= threshold;

            if (force || isNearBottom) {
                box.scrollTop = box.scrollHeight;
            }
        }

        function saveData() {
            localStorage.setItem("astra_chats_v2", JSON.stringify(chats));
        }

        function clearAllData() {
            if (confirm("Are you sure? This will delete all chats and gallery images.")) {
                localStorage.removeItem("astra_chats_v2");
                localStorage.removeItem("astra_gallery_v2");
                location.reload();
            }
        }

        // Modal
        function openModal(url) {
            const m = document.getElementById("imgModal");
            document.getElementById("modalImg").src = url;
            document.getElementById("downloadBtn").onclick = () => downloadImage(url);
            m.classList.add("open");
        }
        function closeModal(e) {
            if (e.target === document.getElementById("imgModal")) {
                document.getElementById("imgModal").classList.remove("open");
            }
        }
        function copyModalLink() {
            const url = document.getElementById("modalImg").src;
            navigator.clipboard.writeText(url);
            alert("Copied to clipboard!");
        }

        async function downloadImage(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = "astra-generated-" + Date.now() + ".png";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                
                // Fallback
                window.open(url, '_blank');
            }
        }

        /******** EXPORT PDF *********/
        function exportChatPDF() {
            if (!currentChat) return;

            // Show loading state
            const btn = document.querySelector('[onclick="exportChatPDF()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating...';

            // Create container for PDF content using a visible overlay
            // This is the most reliable way to ensure html2canvas captures valid pixels
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100vw';
            overlay.style.height = '100vh';
            overlay.style.backgroundColor = '#ffffff';
            overlay.style.zIndex = '99999'; // On top of everything
            overlay.style.overflowY = 'scroll';
            overlay.style.padding = '20px';

            // Inner container for centering and sizing
            const element = document.createElement('div');
            element.className = 'p-8 bg-white font-sans';
            element.style.color = 'black';
            element.style.fontFamily = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
            element.style.maxWidth = '800px';
            element.style.margin = '0 auto'; // Center it
            element.style.width = '100%';

            overlay.appendChild(element);
            document.body.appendChild(overlay);

            // Chat Title
            element.innerHTML = `
                <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee;">
                    <h1 style="font-size: 24px; color: #333; margin: 0;">${currentChat.title}</h1>
                    <div style="font-size: 12px; color: #888; margin-top: 5px;">
                        ${new Date().toLocaleString()}
                    </div>
                </div>
            `;

            // Inline Styles for Code
            const codeBlockStyle = `
                background: #1e1e1e !important;
                color: #d4d4d4 !important;
                padding: 10px;
                border-radius: 6px;
                font-family: monospace;
                white-space: pre-wrap;
                margin: 8px 0;
                font-size: 11px;
                page-break-inside: avoid;
            `;

            const container = document.createElement('div');
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '20px';

            currentChat.messages.forEach(msg => {
                const isUser = msg.role === 'user';

                // Flex Row wrapper
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.justifyContent = isUser ? 'flex-end' : 'flex-start';
                row.style.width = '100%';

                // CRITICAL: Prevent page break inside this message block
                row.style.pageBreakInside = 'avoid';

                // Bubble
                const bubble = document.createElement('div');
                bubble.style.padding = '12px 16px';
                bubble.style.borderRadius = isUser ? '16px 0 16px 16px' : '0 16px 16px 16px';
                bubble.style.maxWidth = '75%';
                bubble.style.boxShadow = '0 1px 2px rgba(0,0,0,0.1)';

                if (isUser) {
                    bubble.style.background = '#2563eb';
                    bubble.style.color = 'white';
                } else {
                    bubble.style.background = '#f1f5f9';
                    bubble.style.color = '#334155';
                    bubble.style.border = '1px solid #e2e8f0';
                }

                let contentHTML = "";
                if (msg.isImage) {
                    const urlMatch = msg.content.match(/\((.*?)\)/);
                    const url = urlMatch ? urlMatch[1] : "";

                    if (url) {
                        contentHTML = `
                            <div style="page-break-inside: avoid; break-inside: avoid; display: block; margin: 10px 0;">
                                <img src="${url}" crossorigin="anonymous" 
                                style="width: 100%; max-width: 400px; border-radius: 8px; display: block; height: auto;">
                            </div>`;
                    } else {
                        contentHTML = `<em>[Image Error]</em>`;
                    }
                } else if (msg.role === 'bot') {
                    contentHTML = marked.parse(msg.content);
                } else {
                    contentHTML = msg.content;
                }

                bubble.innerHTML = `
                    <div class="pdf-content" style="font-size: 12px; line-height: 1.5;">
                        ${contentHTML}
                    </div>
                `;

                // Styling inner elements
                bubble.querySelectorAll('a').forEach(a => {
                    a.style.color = isUser ? '#bfdbfe' : '#2563eb';
                    a.style.textDecoration = 'underline';
                });

                bubble.querySelectorAll('h1, h2, h3').forEach(h => {
                    h.style.color = '#1e293b';
                    h.style.fontWeight = 'bold';
                    h.style.marginTop = '8px';
                    h.style.marginBottom = '4px';
                    h.style.borderBottom = 'none';
                });

                bubble.querySelectorAll('strong').forEach(s => {
                    s.style.fontWeight = 'bold';
                    s.style.color = isUser ? 'white' : 'black';
                });

                bubble.querySelectorAll('pre').forEach(pre => {
                    pre.style.cssText = codeBlockStyle;
                });

                bubble.querySelectorAll('code').forEach(code => {
                    if (!code.closest('pre')) {
                        code.style.background = isUser ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.05)';
                        code.style.padding = '2px 4px';
                        code.style.borderRadius = '4px';
                        code.style.fontFamily = 'monospace';
                    } else {
                        code.style.fontFamily = 'monospace';
                        code.style.color = '#e2e8f0';
                    }
                });

                row.appendChild(bubble);
                container.appendChild(row);
            });

            element.appendChild(container);

            // Wait for images to load
            const images = element.querySelectorAll('img');
            const promises = Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve; // Don't block on error
                });
            });

            Promise.all(promises).then(() => {
                const opt = {
                    margin: [0.3, 0.4, 0.3, 0.4],
                    filename: `Astra_Chat_Design_Export_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        scrollY: 0,
                        backgroundColor: '#ffffff'
                    },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                // Small timeout to ensure DOM is fully repainted
                setTimeout(() => {
                    html2pdf().set(opt).from(element).save().then(() => {
                        document.body.removeChild(overlay);
                        btn.innerHTML = originalText;
                    }).catch(err => {
                    
                        alert("PDF generation failed. Please check console.");
                        document.body.removeChild(overlay);
                        btn.innerHTML = originalText;
                    });
                }, 500);
            });
        }
    </script>
</body>
